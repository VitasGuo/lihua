name: file_search
description: 搜索文件（按文件名/内容/类型/大小）
version: 0.1
category: file
author: lihua
triggers:
  - 找文件
  - 查找文件
  - 搜索文件
  - 找一下文件
  - 文件搜索
  - 查文件
  - find
  - locate
  - 搜索内容
  - 文件内容
examples:
  - 找一下 document.pdf
  - 搜索 config 文件
parameters:
  - name: pattern
    required: true
    description: 文件名模式
    extract: "(?:找|查找|搜索|查|find|locate|search)\\s*(?:一下)?\\s*(?:文件|内容)?\\s*(?:名)?\\s*(?:叫|是)?\\s*(.+?)\\s*$"
  - name: content
    required: false
    description: 文件内容（grep 关键字）
    extract: "(?:搜索内容|文件内容|找内容|grep)\\s+(.+?)\\s*(?:in|在)\\s+(\\S+)"
steps:
  - name: find_home
    type: command
    description: 在用户目录下查找文件
    command: "find ~ -iname '*{{pattern}}*' -not -path '*/\\.*' 2>/dev/null | head -30"
    safety: white
    timeout: 30
    on_failure: continue
  - name: locate
    type: command
    description: 使用 locate 数据库查找
    command: "locate -i '{{pattern}}' 2>/dev/null | head -20 || echo 'locate 数据库未建立，运行 pkexec updatedb'"
    safety: white
    timeout: 10
    on_failure: continue
  - name: grep_content
    type: command
    condition: "{{content}} != "
    description: 在当前目录搜索文件内容
    command: "grep -rn --include='*' -i '{{content}}' . 2>/dev/null | head -20"
    safety: white
    timeout: 30
    on_failure: continue
