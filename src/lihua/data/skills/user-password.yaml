name: user_password
description: 修改用户密码（自己或其他人）
version: 0.1
category: system
author: lihua
triggers:
  - 改密码
  - 修改密码
  - 更改密码
  - 改个密码
  - 修改我的密码
  - 改一下密码
  - change password
  - passwd
examples:
  - 修改密码
  - 改个密码
parameters:
  - name: username
    required: false
    description: 用户名（默认当前用户）
    extract: "(?:修改|改|更改|change)\\s*(?:个|一下)?\\s*(?:我的|当前)?\\s*(?:用户\\s*)?密码\\s*(?:for\\s+(\\S+))?\\s*$|(?:修改|改|更改)\\s+(\\S+)\\s*的密码\\s*$"
steps:
  - name: detect_user
    type: set_var
    vars:
      username: "{{username}}"
      current_user: "$(whoami)"
    description: 解析用户名
  - name: change_current
    type: command
    condition: "{{username}} ==  || {{username}} == {{current_user}}"
    description: 修改当前用户密码
    command: "passwd"
    safety: grey
    confirm: "修改当前用户密码（系统会要求输入旧密码和新密码两次）"
    timeout: 60
    on_failure: stop
  - name: change_other
    type: command
    condition: "{{username}} !=  && {{username}} != {{current_user}}"
    description: 修改其他用户密码（需要管理员权限）
    command: "pkexec passwd {{username}}"
    safety: grey
    confirm: "修改用户 {{username}} 的密码（需要管理员权限）"
    timeout: 60
    on_failure: stop
  - name: notify
    type: notify
    command: "notify-send '狸花猫' '密码修改完成'"
