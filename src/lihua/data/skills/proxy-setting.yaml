name: proxy_setting
description: 设置或查看系统代理（HTTP/SOCKS/gsettings）
version: 0.1
category: network
author: lihua
triggers:
  - 设置代理
  - 设代理
  - 配置代理
  - 改代理
  - 代理设置
  - 系统 proxy
  - 系统 代理
  - 查看代理
  - 看代理
  - 取消代理
  - 关闭代理
  - 清除代理
  - 代理
examples:
  - 设置代理 127.0.0.1:7890
  - 取消代理
  - 查看代理
parameters:
  - name: action
    required: false
    description: 操作（set / clear / show）
    extract: "(设置|配置|改|设|开启|打开|取消|关闭|清除|查看|看|show|status)"
  - name: proxy_url
    required: false
    description: 代理地址（host:port）
    extract: "([0-9]{1,3}(?:\\.[0-9]{1,3}){3}:[0-9]{1,5}|localhost:[0-9]{1,5}|[a-zA-Z0-9._-]+:[0-9]{1,5})"
steps:
  - name: show_proxy
    type: command
    condition: "{{action}} == 查看 || {{action}} == 看 || {{action}} == show || {{action}} == status || {{action}} ==  && {{proxy_url}} == "
    description: 查看当前代理设置
    command: "echo '=== GNOME 代理 ===' ; gsettings get org.gnome.system.proxy mode ; gsettings get org.gnome.system.proxy.http host ; gsettings get org.gnome.system.proxy.http port ; echo '=== 环境变量 ===' ; env | grep -i proxy"
    safety: white
    timeout: 10
    on_failure: continue
  - name: set_http_proxy
    type: command
    condition: "{{action}} == 设置 || {{action}} == 配置 || {{action}} == 改 || {{action}} == 设 || {{action}} == 开启 || {{action}} == 打开"
    description: 设置 GNOME 系统代理为 HTTP 代理
    command: "gsettings set org.gnome.system.proxy mode 'manual' && gsettings set org.gnome.system.proxy.http host '{{proxy_url|default:127.0.0.1}}' && gsettings set org.gnome.system.proxy.https host '{{proxy_url|default:127.0.0.1}}'"
    safety: grey
    confirm: "设置系统 HTTP 代理为 {{proxy_url|default:127.0.0.1}}"
    timeout: 10
    on_failure: stop
  - name: clear_proxy
    type: command
    condition: "{{action}} == 取消 || {{action}} == 关闭 || {{action}} == 清除"
    description: 取消系统代理
    command: "gsettings set org.gnome.system.proxy mode 'none'"
    safety: grey
    confirm: "取消系统代理设置"
    timeout: 10
    on_failure: continue
  - name: notify
    type: notify
    command: "notify-send '狸花猫' '代理设置已更新'"
